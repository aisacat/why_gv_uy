<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MY SPACE</title>
    <meta name="description" content="个人常用网站导航与书签">
    <!-- Favicon -->
    <link rel="icon" href="https://github.githubassets.com/favicons/favicon.svg" type="image/svg+xml">
    <!-- 引入 FontAwesome 免费图标库 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        /* 默认浅色主题变量 */
        :root {
            --bg-color: #f5f7fa;
            --card-bg: #ffffff;
            --text-primary: #2c3e50;
            --text-secondary: #6b7c93;
            --accent-color: #3b82f6;
            --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.03);
            --radius: 12px;
        }

        /* 自动跟随系统暗色模式 */
        @media (prefers-color-scheme: dark) {
            :root {
                --bg-color: #0d1117;
                --card-bg: #161b22;
                --text-primary: #c9d1d9;
                --text-secondary: #8b949e;
                --accent-color: #58a6ff;
                --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.3), 0 2px 4px -1px rgba(0, 0, 0, 0.2);
            }
            /* 修复暗色模式下下拉菜单选项框白底白字的问题 */
            .search-engine-select option {
                background-color: #161b22;
                color: #c9d1d9;
            }
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-primary);
            line-height: 1.6;
            min-height: 100vh;
            transition: background-color 0.3s, color 0.3s;
        }

        .container {
            max-width: 960px;
            margin: 0 auto;
            padding: 60px 20px;
        }

        /* Header */
        header { text-align: center; margin-bottom: 50px; }
        header h1 { font-size: 2.2rem; margin-bottom: 10px; letter-spacing: -0.5px; }
        header p { color: var(--text-secondary); font-size: 1.1rem; }

        /* Search Bar */
        .search-box {
            max-width: 560px;
            margin: 30px auto 50px;
            position: relative;
            display: flex;
            align-items: center;
        }
        /* 搜索引擎下拉框 */
        .search-engine-select {
            position: absolute;
            left: 4px;
            top: 50%;
            transform: translateY(-50%);
            border: none;
            background: transparent;
            color: var(--text-primary);
            font-size: 0.95rem;
            font-weight: 500;
            padding: 8px 28px 8px 12px;
            outline: none;
            cursor: pointer;
            border-radius: 50px;
            appearance: none;
            -webkit-appearance: none;
            z-index: 2;
        }
        .search-engine-select:hover {
            background: rgba(128, 128, 128, 0.1);
        }
        /* 搜索输入框 */
        .search-box input {
            width: 100%;
            padding: 14px 24px 14px 110px;
            border: 2px solid transparent;
            border-radius: 50px;
            font-size: 1rem;
            background: var(--card-bg);
            color: var(--text-primary);
            box-shadow: var(--shadow);
            outline: none;
            transition: all 0.3s ease;
        }
        .search-box input:focus {
            border-color: var(--accent-color);
            box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.1);
        }

        /* Category */
        .category { margin-bottom: 40px; }
        .category-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }
        .category-title {
            font-size: 1.2rem;
            padding-left: 12px;
            border-left: 4px solid var(--accent-color);
            display: flex;
            align-items: center;
        }
        .add-site-btn {
            background: var(--accent-color);
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: all 0.3s ease;
        }
        .add-site-btn:hover {
            opacity: 0.9;
            transform: scale(1.05);
        }

        /* Grid */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 16px;
        }

        /* Card */
        .card {
            background: var(--card-bg);
            border-radius: var(--radius);
            padding: 20px;
            text-decoration: none;
            color: inherit;
            box-shadow: var(--shadow);
            transition: all 0.25s ease;
            display: flex;
            align-items: center;
            gap: 14px;
            position: relative;
            group: true;
        }
        .card:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 20px -5px rgba(0, 0, 0, 0.1);
        }
        .card-icon {
            width: 40px;
            height: 40px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            flex-shrink: 0;
        }
        .card-icon img { width: 24px; height: 24px; object-fit: contain; }
        .card-info h3 { font-size: 0.95rem; margin-bottom: 2px; }
        .card-info p { 
            font-size: 0.78rem; 
            color: var(--text-secondary); 
            white-space: nowrap; 
            overflow: hidden; 
            text-overflow: ellipsis; 
            max-width: 140px;
        }
        
        /* Card 操作按钮容器 */
        .card-actions {
            position: absolute;
            top: 8px;
            right: 8px;
            display: flex;
            gap: 6px;
            opacity: 0;
            transition: opacity 0.3s ease;
        }
        .card:hover .card-actions {
            opacity: 1;
        }
        
        .card-btn {
            width: 28px;
            height: 28px;
            border-radius: 6px;
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.85rem;
            transition: all 0.3s ease;
            background: rgba(59, 130, 246, 0.1);
            color: var(--accent-color);
        }
        .card-btn:hover {
            background: rgba(59, 130, 246, 0.2);
            transform: scale(1.1);
        }
        .card-delete-btn {
            background: rgba(255, 59, 48, 0.1);
            color: #ff3b30;
        }
        .card-delete-btn:hover {
            background: rgba(255, 59, 48, 0.2);
        }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }
        .modal.active {
            display: flex;
        }
        .modal-content {
            background: var(--card-bg);
            border-radius: var(--radius);
            padding: 30px;
            max-width: 500px;
            width: 90%;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-height: 90vh;
            overflow-y: auto;
        }
        .modal-header {
            font-size: 1.3rem;
            margin-bottom: 20px;
            font-weight: 600;
        }
        .form-group {
            margin-bottom: 16px;
        }
        .form-group label {
            display: block;
            margin-bottom: 6px;
            font-size: 0.95rem;
            font-weight: 500;
        }
        .form-group label .required {
            color: #ff3b30;
        }
        .form-group input, .form-group select {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid var(--text-secondary);
            border-radius: 6px;
            background: var(--card-bg);
            color: var(--text-primary);
            font-size: 0.95rem;
            outline: none;
            transition: all 0.3s ease;
        }
        .form-group input:focus, .form-group select:focus {
            border-color: var(--accent-color);
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
        }
        .form-group input:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        .icon-preview {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-top: 8px;
            padding: 12px;
            background: rgba(59, 130, 246, 0.1);
            border-radius: 6px;
        }
        .icon-preview-img {
            width: 32px;
            height: 32px;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            flex-shrink: 0;
        }
        .icon-preview-img img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }
        .icon-preview-text {
            font-size: 0.85rem;
            color: var(--text-secondary);
        }
        .fetch-btn {
            background: var(--accent-color);
            color: white;
            border: none;
            padding: 8px 14px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.85rem;
            transition: all 0.3s ease;
            margin-top: 8px;
        }
        .fetch-btn:hover {
            opacity: 0.9;
        }
        .fetch-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        .fetch-btn.loading::after {
            content: ' ⏳';
        }
        .form-actions {
            display: flex;
            gap: 12px;
            margin-top: 24px;
        }
        .btn {
            flex: 1;
            padding: 10px 16px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.95rem;
            font-weight: 500;
            transition: all 0.3s ease;
        }
        .btn-primary {
            background: var(--accent-color);
            color: white;
        }
        .btn-primary:hover {
            opacity: 0.9;
        }
        .btn-secondary {
            background: var(--text-secondary);
            color: white;
        }
        .btn-secondary:hover {
            opacity: 0.8;
        }

        /* Footer */
        footer {
            text-align: center;
            margin-top: 60px;
            color: var(--text-secondary);
            font-size: 0.85rem;
        }
        footer a { color: var(--accent-color); text-decoration: none; }

        /* Responsive */
        @media (max-width: 640px) {
            .container { padding: 30px 16px; }
            header h1 { font-size: 1.6rem; }
            .grid { grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 12px; }
            .card { padding: 16px; gap: 10px; }
            .card-icon { width: 34px; height: 34px; font-size: 1.2rem; }
            .card-info p { max-width: 100px; }
            .search-box input { padding-left: 100px; }
            .category-header {
                flex-direction: column;
                align-items: flex-start;
                gap: 12px;
            }
            .add-site-btn {
                width: 100%;
                justify-content: center;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🚀 My Nav</h1>
            <p>高效娱乐，从好的导航开始</p>
        </header>

        <div class="search-box">
            <select id="searchEngine" class="search-engine-select">
                <option value="baidu">百度</option>
                <option value="google">Google</option>
                <option value="bing">Bing</option>
            </select>
            <input type="text" id="searchInput" placeholder="输入关键词搜索..." oninput="filterSites()" onkeydown="handleSearch(event)">
        </div>

        <div id="navContent"></div>

        <footer>
            <p>© 2026 My Navigation · Powered by <a href="https://pages.github.com" target="_blank">GitHub Pages</a></p>
        </footer>
    </div>

    <!-- 添加/编辑网站的 Modal -->
    <div id="addSiteModal" class="modal">
        <div class="modal-content">
            <div class="modal-header" id="modalTitle">添加网站</div>
            <form id="addSiteForm">
                <div class="form-group">
                    <label for="siteName">网站名称 <span class="required">*</span></label>
                    <input type="text" id="siteName" placeholder="例如：哔哩哔哩" required>
                </div>
                <div class="form-group">
                    <label for="siteUrl">网站链接 <span class="required">*</span></label>
                    <div style="display: flex; gap: 8px;">
                        <input type="url" id="siteUrl" placeholder="例如：https://www.bilibili.com" required style="flex: 1;">
                        <button type="button" class="fetch-btn" id="fetchIconBtn" onclick="fetchFaviconAndColor()">
                            <i class="fas fa-download"></i> 获取
                        </button>
                    </div>
                </div>
                <div class="form-group">
                    <label for="siteDesc">网站描述</label>
                    <input type="text" id="siteDesc" placeholder="例如：国内知名的视频弹幕网站">
                </div>
                <div class="form-group">
                    <label>图标 (自动获取，可手动编辑)</label>
                    <input type="text" id="siteIcon" placeholder="自动获取或手动输入 FontAwesome 类名">
                    <div id="iconPreview" class="icon-preview" style="display: none;">
                        <div class="icon-preview-img" id="previewIcon"></div>
                        <div class="icon-preview-text" id="previewText"></div>
                    </div>
                </div>
                <div class="form-group">
                    <label for="siteColor">颜色 (自动获取，可手动编辑)</label>
                    <div style="display: flex; gap: 8px; align-items: center;">
                        <input type="text" id="siteColor" placeholder="例如：#fb7299" value="#3b82f6" style="flex: 1;">
                        <div style="width: 40px; height: 40px; border-radius: 6px; border: 2px solid var(--text-secondary);" id="colorPreview"></div>
                    </div>
                </div>
                <div class="form-actions">
                    <button type="submit" class="btn btn-primary" id="submitBtn">添加</button>
                    <button type="button" class="btn btn-secondary" onclick="closeModal()">取消</button>
                </div>
            </form>
        </div>
    </div>

<script>
// ============================================
// ⬇️ 导航数据与搜索引擎配置 ⬇️
// ============================================
const DEFAULT_NAV_DATA = [
    {
        category: "🇨🇳 国内常用",
        sites: [
            { name: "哔哩哔哩", url: "https://www.bilibili.com", desc: "国内知名的视频弹幕网站", icon: "fa-brands fa-bilibili", color: "#fb7299" },
            { name: "微博", url: "https://weibo.com", desc: "随时随地发现新鲜事", icon: "fa-brands fa-weibo", color: "#e6162d" },
            { name: "抖音", url: "https://www.douyin.com", desc: "记录美好生活", icon: "fa-brands fa-tiktok", color: "#000000" },
            { name: "什么值得买", url: "https://www.smzdm.com", desc: "消费决策与购物指南", icon: "fa-solid fa-cart-shopping", color: "#e1251b" },
            { name: "Steam", url: "https://store.steampowered.com", desc: "全球数字游戏平台", icon: "https://store.steampowered.com/favicon.ico", color: "#171a21", isImage: true },
        ]
    },
    {
        category: "🌍 国外站点",
        sites: [
            { name: "YouTube", url: "https://www.youtube.com", desc: "全球最大的视频分享平台", icon: "fa-brands fa-youtube", color: "#ff0000" },
            { name: "TikTok", url: "https://www.tiktok.com", desc: "全球短视频社交平台", icon: "fa-brands fa-tiktok", color: "#000000" },
            { name: "Reddit", url: "https://www.reddit.com", desc: "全球最大的社区论坛", icon: "fa-brands fa-reddit-alien", color: "#ff4500" },
            { name: "推特 (X)", url: "https://twitter.com", desc: "实时社交与新闻资讯", icon: "fa-brands fa-x-twitter", color: "#1d9bf0" },
            { name: "Gmail", url: "https://mail.google.com", desc: "Google 免费电子邮件", icon: "fa-solid fa-envelope", color: "#ea4335" },
            { name: "Tuta Mail", url: "https://tuta.com", desc: "注重隐私的加密邮箱", icon: "fa-solid fa-lock", color: "#85c644" },
            { name: "Proton Mail", url: "https://proton.me/mail", desc: "瑞士安全加密邮箱", icon: "fa-solid fa-shield-halved", color: "#6d4aff" },
            { name: "Cloudflare", url: "https://dash.cloudflare.com", desc: "网站安全与加速服务", icon: "fa-solid fa-cloud", color: "#f38020" },
        ]
    }
];

const SEARCH_ENGINES = {
    baidu: "https://www.baidu.com/s?wd=",
    google: "https://www.google.com/search?q=",
    bing: "https://cn.bing.com/search?q="
};

// 获取导航数据（从本地存储或使用默认数据）
function getNavData() {
    const saved = localStorage.getItem('navData');
    return saved ? JSON.parse(saved) : JSON.parse(JSON.stringify(DEFAULT_NAV_DATA));
}

// 保存导航数据到本地存储
function saveNavData(data) {
    localStorage.setItem('navData', JSON.stringify(data));
}

// 全局变量存储当前编辑的类别和网站索引
let currentCategoryIndex = 0;
let currentSiteIndex = -1; // -1 表示添加新网站，否则是编辑模式

// ============================================
// ⬆️ 配置结束 ⬆️
// ============================================

// 获取网站的 favicon 和主题色
async function fetchFaviconAndColor() {
    const url = document.getElementById('siteUrl').value.trim();
    if (!url) {
        alert('请先输入网站链接');
        return;
    }

    const btn = document.getElementById('fetchIconBtn');
    btn.disabled = true;
    btn.classList.add('loading');
    btn.textContent = '获取中...';

    try {
        const urlObj = new URL(url);
        const domain = urlObj.hostname;
        
        // 尝试获取 favicon
        const faviconUrl = `https://www.google.com/s2/favicons?domain=${domain}&sz=128`;
        
        document.getElementById('siteIcon').value = faviconUrl;
        document.getElementById('siteIcon').dataset.isImage = 'true';
        
        // 尝试提取网站主题色（这里使用一个通用的颜色服务）
        await extractColorFromFavicon(faviconUrl);
        
        updateIconPreview();
    } catch (error) {
        console.error('获取 favicon 失败:', error);
        alert('获取图标失败，请手动输入');
    } finally {
        btn.disabled = false;
        btn.classList.remove('loading');
        btn.textContent = '获取';
    }
}

// 从 favicon 中提取主题色
async function extractColorFromFavicon(faviconUrl) {
    try {
        const img = new Image();
        img.crossOrigin = 'Anonymous';
        
        img.onload = function() {
            const canvas = document.createElement('canvas');
            canvas.width = img.width;
            canvas.height = img.height;
            
            const ctx = canvas.getContext('2d');
            ctx.drawImage(img, 0, 0);
            
            // 获取图像数据
            const imageData = ctx.getImageData(0, 0, img.width, img.height);
            const data = imageData.data;
            
            // 计算主要颜色（获取出现频率最高的非白色、非黑色的颜色）
            const colorMap = {};
            for (let i = 0; i < data.length; i += 4) {
                const r = data[i];
                const g = data[i + 1];
                const b = data[i + 2];
                const a = data[i + 3];
                
                // 忽略透明和接近白色/黑色的颜色
                if (a < 200 || (r > 230 && g > 230 && b > 230) || (r < 25 && g < 25 && b < 25)) {
                    continue;
                }
                
                const color = `rgb(${r},${g},${b})`;
                colorMap[color] = (colorMap[color] || 0) + 1;
            }
            
            // 获取出现次数最多的颜色
            let dominantColor = '#3b82f6';
            let maxCount = 0;
            for (const color in colorMap) {
                if (colorMap[color] > maxCount) {
                    maxCount = colorMap[color];
                    dominantColor = rgbToHex(color);
                }
            }
            
            document.getElementById('siteColor').value = dominantColor;
            updateColorPreview();
        };
        
        img.src = faviconUrl;
    } catch (error) {
        console.error('提取颜色失败:', error);
    }
}

// RGB 转 16 进制颜色
function rgbToHex(rgb) {
    const match = rgb.match(/^rgb\((\d+),\s*(\d+),\s*(\d+)\)$/);
    if (!match) return '#3b82f6';
    
    const hex = (x) => {
        const hexValue = x.toString(16);
        return hexValue.length === 1 ? '0' + hexValue : hexValue;
    };
    
    return '#' + hex(parseInt(match[1])) + hex(parseInt(match[2])) + hex(parseInt(match[3]));
}

// 更新图标预览
function updateIconPreview() {
    const icon = document.getElementById('siteIcon').value;
    const preview = document.getElementById('iconPreview');
    const previewIcon = document.getElementById('previewIcon');
    const previewText = document.getElementById('previewText');
    
    if (!icon) {
        preview.style.display = 'none';
        return;
    }
    
    preview.style.display = 'flex';
    
    if (icon.startsWith('http')) {
        previewIcon.innerHTML = `<img src="${icon}" alt="favicon">`;
        previewText.textContent = '图标 URL: ' + icon.substring(0, 40) + '...';
    } else {
        previewIcon.innerHTML = `<i class="${icon}"></i>`;
        previewText.textContent = 'FontAwesome: ' + icon;
    }
}

// 更新颜色预览
function updateColorPreview() {
    const color = document.getElementById('siteColor').value;
    const preview = document.getElementById('colorPreview');
    if (color) {
        preview.style.backgroundColor = color;
    }
}

// 监听输入变化
document.getElementById('siteIcon').addEventListener('input', updateIconPreview);
document.getElementById('siteColor').addEventListener('input', updateColorPreview);

// 处理回车搜索
function handleSearch(event) {
    if (event.key === 'Enter') {
        const keyword = document.getElementById('searchInput').value.trim();
        if (keyword) {
            const engine = document.getElementById('searchEngine').value;
            localStorage.setItem('lastSearchEngine', engine);
            const searchUrl = SEARCH_ENGINES[engine] + encodeURIComponent(keyword);
            window.open(searchUrl, '_blank');
        }
    }
}

// 过滤站点
function filterSites() {
    const keyword = document.getElementById('searchInput').value.toLowerCase().trim();
    if (event && event.key === 'Enter') return;

    const navData = getNavData();
    if (!keyword) { renderNav(navData); return; }
    const filtered = navData.map(cat => ({
        ...cat,
        sites: cat.sites.filter(s => 
            s.name.toLowerCase().includes(keyword) || 
            s.desc.toLowerCase().includes(keyword)
        )
    }));
    renderNav(filtered);
}

// 打开添加网站的 Modal
function openAddSiteModal(categoryIndex) {
    currentCategoryIndex = categoryIndex;
    currentSiteIndex = -1;
    document.getElementById('modalTitle').textContent = '添加网站';
    document.getElementById('submitBtn').textContent = '添加';
    document.getElementById('addSiteForm').reset();
    document.getElementById('siteColor').value = '#3b82f6';
    document.getElementById('siteIcon').value = '';
    document.getElementById('iconPreview').style.display = 'none';
    updateColorPreview();
    document.getElementById('addSiteModal').classList.add('active');
}

// 打开编辑网站的 Modal
function openEditSiteModal(categoryIndex, siteIndex) {
    currentCategoryIndex = categoryIndex;
    currentSiteIndex = siteIndex;
    document.getElementById('modalTitle').textContent = '编辑网站';
    document.getElementById('submitBtn').textContent = '保存';
    
    const navData = getNavData();
    const site = navData[categoryIndex].sites[siteIndex];
    
    document.getElementById('siteName').value = site.name;
    document.getElementById('siteUrl').value = site.url;
    document.getElementById('siteDesc').value = site.desc || '';
    document.getElementById('siteIcon').value = site.icon;
    document.getElementById('siteColor').value = site.color;
    
    updateIconPreview();
    updateColorPreview();
    document.getElementById('addSiteModal').classList.add('active');
}

// 关闭 Modal
function closeModal() {
    document.getElementById('addSiteModal').classList.remove('active');
}

// 处理添加/编辑网站的表单提交
document.getElementById('addSiteForm').addEventListener('submit', function(e) {
    e.preventDefault();
    
    const navData = getNavData();
    const iconValue = document.getElementById('siteIcon').value;
    const newSite = {
        name: document.getElementById('siteName').value,
        url: document.getElementById('siteUrl').value,
        desc: document.getElementById('siteDesc').value,
        icon: iconValue || 'fa-solid fa-link',
        color: document.getElementById('siteColor').value,
        isImage: iconValue.startsWith('http')
    };

    if (currentSiteIndex === -1) {
        // 添加新网站
        navData[currentCategoryIndex].sites.push(newSite);
    } else {
        // 编辑现有网站
        navData[currentCategoryIndex].sites[currentSiteIndex] = newSite;
    }
    
    saveNavData(navData);
    renderNav(navData);
    closeModal();
});

// 删除网站
function deleteSite(categoryIndex, siteIndex) {
    if (confirm('确定要删除这个网站吗？')) {
        const navData = getNavData();
        navData[categoryIndex].sites.splice(siteIndex, 1);
        saveNavData(navData);
        renderNav(navData);
    }
}

// 渲染导航
function renderNav(data) {
    const container = document.getElementById('navContent');
    if (data.every(cat => cat.sites.length === 0)) {
        container.innerHTML = '<p style="text-align:center;color:#999;padding:40px;">没有找到匹配的站点 😢</p>';
        return;
    }
    container.innerHTML = data.map((cat, catIndex) => {
        if (cat.sites.length === 0) return '';
        const cards = cat.sites.map((site, siteIndex) => `
            <a class="card" href="${site.url}" target="_blank" rel="noopener noreferrer">
                <div class="card-actions">
                    <button class="card-btn" onclick="event.preventDefault(); event.stopPropagation(); openEditSiteModal(${catIndex}, ${siteIndex});" title="编辑">
                        <i class="fas fa-edit"></i>
                    </button>
                    <button class="card-btn card-delete-btn" onclick="event.preventDefault(); event.stopPropagation(); deleteSite(${catIndex}, ${siteIndex});" title="删除">
                        <i class="fas fa-trash"></i>
                    </button>
                </div>
                <div class="card-icon" style="background:${site.color}15;color:${site.color}">
                    ${site.isImage ? `<img src="${site.icon}" alt="${site.name}">` : `<i class="${site.icon}"></i>`}
                </div>
                <div class="card-info">
                    <h3>${site.name}</h3>
                    <p>${site.desc || '暂无描述'}</p>
                </div>
            </a>
        `).join('');
        return `
            <div class="category">
                <div class="category-header">
                    <div class="category-title">${cat.category}</div>
                    <button class="add-site-btn" onclick="openAddSiteModal(${catIndex})">
                        <i class="fas fa-plus"></i> 添加网站
                    </button>
                </div>
                <div class="grid">${cards}</div>
            </div>`;
    }).join('');
}

// 点击 Modal 外部关闭
document.getElementById('addSiteModal').addEventListener('click', function(e) {
    if (e.target === this) {
        closeModal();
    }
});

// 初始化
const savedEngine = localStorage.getItem('lastSearchEngine');
if (savedEngine) {
    document.getElementById('searchEngine').value = savedEngine;
}
document.getElementById('searchEngine').addEventListener('change', function() {
    localStorage.setItem('lastSearchEngine', this.value);
});
    
renderNav(getNavData());
</script>
</body>
</html>
